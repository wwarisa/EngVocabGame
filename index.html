  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      background: #060d1f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      position: relative;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3f5c; border-radius: 4px; }

    /* ── Animations ── */
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      15%{transform:translateX(-9px)}
      30%{transform:translateX(9px)}
      45%{transform:translateX(-6px)}
      60%{transform:translateX(6px)}
      75%{transform:translateX(-3px)}
    }
    @keyframes glowGreen {
      0%,100%{box-shadow:0 0 8px #22c55e}
      50%{box-shadow:0 0 28px #22c55e, 0 0 50px #4ade80}
    }
    @keyframes bounceIn {
      0%{transform:scale(0.4);opacity:0}
      55%{transform:scale(1.12)}
      80%{transform:scale(0.95)}
      100%{transform:scale(1);opacity:1}
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes slideUp {
      from{transform:translateY(100%)}
      to{transform:translateY(0)}
    }
    @keyframes coinFloat {
      0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0;transform:translate(-50%,-120%) scale(0.5)}
    }
    @keyframes starPop {
      0%{transform:scale(0) rotate(-20deg);opacity:0}
      70%{transform:scale(1.25) rotate(8deg)}
      100%{transform:scale(1) rotate(0);opacity:1}
    }
    @keyframes pulse {
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.15)}
    }
    @keyframes fogDrift {
      0%,100%{opacity:.65;transform:translateX(0)}
      50%{opacity:.85;transform:translateX(4px)}
    }
    @keyframes shimmer {
      0%{background-position:-200% 0}
      100%{background-position:200% 0}
    }
    @keyframes floatBob {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }
    @keyframes heartLose {
      0%{transform:scale(1)}
      30%{transform:scale(1.4)}
      60%{transform:scale(0.8)}
      100%{transform:scale(1)}
    }

    .anim-shake{animation:shake .45s ease-in-out}
    .anim-glow{animation:glowGreen .5s ease-in-out}
    .anim-bounce-in{animation:bounceIn .45s cubic-bezier(.175,.885,.32,1.275)}
    .anim-fade-up{animation:fadeUp .35s ease-out}
    .anim-slide-up{animation:slideUp .35s cubic-bezier(.25,.46,.45,.94)}
    .anim-float{animation:floatBob 3s ease-in-out infinite}

    /* ── Runestone ── */
    .runestone {
      position:relative;
      border:none;
      border-radius:18px;
      cursor:pointer;
      transition:transform .12s,box-shadow .12s;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      touch-action:manipulation;
    }
    .runestone:active:not(:disabled){transform:scale(.94)}
    .runestone:disabled{cursor:default}

    /* ── Progress bar ── */
    .prog-bar{height:8px;border-radius:6px;background:#1a2744;overflow:hidden}
    .prog-fill{
      height:100%;border-radius:6px;
      background:linear-gradient(90deg,#22c55e,#4ade80);
      transition:width .4s cubic-bezier(.25,.46,.45,.94);
    }

    /* ── Stars ── */
    .star{display:inline-block;font-size:2.8rem;opacity:.2;transform:scale(0)}
    .star.earned{opacity:1;animation:starPop .5s cubic-bezier(.175,.885,.32,1.275) forwards}

    /* ── Fog on locked zones ── */
    .fog{
      position:absolute;inset:0;border-radius:18px;
      background:linear-gradient(135deg,rgba(10,18,40,.85),rgba(10,18,40,.92));
      pointer-events:none;
      animation:fogDrift 4s ease-in-out infinite;
    }

    /* ── Shimmer skeleton ── */
    .shimmer{
      background:linear-gradient(90deg,#1a2744 25%,#243354 50%,#1a2744 75%);
      background-size:200% 100%;
      animation:shimmer 1.5s infinite;
    }

    /* ── Scrollable area ── */
    .scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch}

    /* ── Tap highlight fix ── */
    button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}

    /* ── Input ── */
    input,select,textarea{
      -webkit-appearance:none;
      outline:none;
      font-family:inherit;
    }
    input:focus,select:focus,textarea:focus{
      border-color:#6366f1 !important;
      box-shadow:0 0 0 3px rgba(99,102,241,.2);
    }
  </style>
</head>

/* ════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getOptions(correct, pool) {
  const others = pool.filter(w => w.id !== correct.id);
  const wrongs = shuffle(others).slice(0, 3);
  return shuffle([correct, ...wrongs]);
}

function maskWord(w) {
  const up = w.toUpperCase();
  if (up.length <= 2) return up[0] + '_';
  if (up.length === 3) return up[0] + '_' + up[2];
  const inner = [];
  for (let i = 1; i < up.length - 1; i++) inner.push(i);
  const hide = shuffle(inner).slice(0, Math.max(1, Math.floor((up.length - 2) * 0.55)));
  return up.split('').map((c, i) => hide.includes(i) ? '_' : c).join(' ');
}

function getMasked(word) {
  return word.split(' ').map(maskWord).join('   ');
}

/* ── Twemoji image component ── */
function EmojiImg({ emoji, size = 80, style: extraStyle }) {
  const [src, setSrc] = useState(null);

  useEffect(() => {
    if (!window.twemoji) return;
    let icon = '';
    window.twemoji.parse(emoji, {
      callback: (iconCode) => { icon = iconCode; return ''; },
      base: '', folder: '', ext: '',
    });
    if (icon) {
      setSrc(`https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/svg/${icon}.svg`);
    }
  }, [emoji]);

  if (!src) {
    return (
      <span style={{ fontSize: size * 0.85 + 'px', lineHeight: 1, display: 'block',
        filter: 'drop-shadow(0 4px 12px rgba(0,0,0,.5))', ...extraStyle }}>
        {emoji}
      </span>
    );
  }
  return (
    <img
      src={src}
      width={size} height={size}
      alt={emoji}
      style={{ display: 'block', filter: 'drop-shadow(0 4px 14px rgba(0,0,0,.5))',
        borderRadius: size * 0.12 + 'px', ...extraStyle }}
      onError={() => setSrc(null)}
    />
  );
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playTone(type) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    if (type === 'correct') {
      [[523,0],[659,.1],[784,.2]].forEach(([f,t]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(.25, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .3);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .3);
      });
    } else if (type === 'wrong') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(220, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + .25);
      g.gain.setValueAtTime(.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .3);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + .3);
    } else if (type === 'complete') {
      [523,659,784,1047].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        const t = i * .18;
        g.gain.setValueAtTime(.3, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .35);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .35);
      });
    }
  } catch(_) {}
}

function speak(word) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = .85; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

function useLS(key, def) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; }
    catch { return def; }
  });
  const set = useCallback(nv => {
    setVal(prev => {
      const next = typeof nv === 'function' ? nv(prev) : nv;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

    >
      {state === 'correct' && <span style={{ fontSize:'.65rem', color:'#4ade80', display:'block' }}>✓ ถูกต้อง!</span>}
      {state === 'wrong'   && <span style={{ fontSize:'.65rem', color:'#f87171', display:'block' }}>✗ ผิด</span>}
      {state === 'show_correct' && <span style={{ fontSize:'.65rem', color:'#86efac', display:'block' }}>← คำตอบที่ถูก</span>}
      <span>{option.word}</span>
    </button>
  );
}

/* ════════════════════════════════════════════
   GAMEPLAY SCREEN
════════════════════════════════════════════ */
function GameplayScreen({ zone, level, vocabulary, onComplete, onExit }) {
  const z = ZONES.find(z => z.id === zone.id);
  const pool = vocabulary.filter(v => v.zone === zone.id);

  const questions = useMemo(() => {
    const repeated = [];
    while (repeated.length < QUESTIONS_PER_ROUND) repeated.push(...shuffle(pool));
    const qs = repeated.slice(0, QUESTIONS_PER_ROUND);
    return qs.map(q => ({
      correct: q,
      options: getOptions(q, pool),
      masked: getMasked(q.word),
    }));
  }, [zone.id, level]);

  const [idx, setIdx]           = useState(0);
  const [hearts, setHearts]     = useState(HEARTS_MAX);
  const [combo, setCombo]       = useState(0);
  const [coins, setCoins]       = useState(0);
  const [mistakes, setMistakes] = useState([]);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [showCoin, setShowCoin] = useState(false);
  const [busy, setBusy]         = useState(false);
  const [animHeart, setAnimHeart] = useState(false);
  const [exitConfirm, setExitConfirm] = useState(false);
  // Level 3 typing state
  const [typedAnswer, setTypedAnswer] = useState('');
  const [typeFeedback, setTypeFeedback] = useState(null); // null|'correct'|'wrong'
  const [showHint, setShowHint]   = useState(false);
  const inputRef = useRef(null);

  const q = questions[idx];

  useEffect(() => {
    if (level === 2 && q) setTimeout(() => speak(q.correct.word), 350);
    if (level === 3) {
      setTypedAnswer(''); setTypeFeedback(null); setShowHint(false);
      setTimeout(() => inputRef.current?.focus(), 200);
    }
  }, [idx, level]);

  // shared "advance to next question or finish"
  const advance = useCallback((earnedCoins, currentMistakes, currentHearts, failed) => {
    if (failed) { onComplete({ coins:0, mistakes:currentMistakes, hearts:0, failed:true }); return; }
    const nextIdx = idx + 1;
    if (nextIdx < questions.length) {
      setTimeout(() => {
        setIdx(nextIdx);
        setFeedback(null); setSelected(null);
        setTypeFeedback(null); setTypedAnswer('');
        setBusy(false);
      }, 300);
    } else {
      playTone('complete');
      onComplete({ coins: earnedCoins, mistakes: currentMistakes, hearts: currentHearts, failed: false });
    }
  }, [idx, questions.length, onComplete]);

  // Level 1 & 2 answer handler
  const answer = useCallback((opt) => {
    if (busy) return;
    setBusy(true);
    setSelected(opt.id);
    const ok = opt.id === q.correct.id;
    if (ok) {
      const nc = combo + 1; setCombo(nc);
      const mult = nc >= 5 ? 2 : nc >= 3 ? 1.5 : 1;
      const earned = Math.round(BASE_COINS * mult);
      setCoins(c => c + earned);
      setFeedback('correct'); setShowCoin(true);
      playTone('correct'); speak(q.correct.word);
      setTimeout(() => setShowCoin(false), 900);
      setTimeout(() => advance(coins + earned, mistakes, hearts, false), 900);
    } else {
      setFeedback('wrong'); setCombo(0);
      setAnimHeart(true); setTimeout(() => setAnimHeart(false), 500);
      const nh = hearts - 1; setHearts(nh);
      const nm = [...mistakes, q.correct]; setMistakes(nm);
      playTone('wrong');
      setTimeout(() => advance(coins, nm, nh, nh <= 0), 1300);
    }
  }, [busy, q, combo, hearts, coins, mistakes, advance]);

  // Level 3 typing submit
  const submitTyped = useCallback(() => {
    if (busy || !typedAnswer.trim()) return;
    setBusy(true);
    const ok = typedAnswer.trim().toLowerCase() === q.correct.word.toLowerCase();
    if (ok) {
      const nc = combo + 1; setCombo(nc);
      const mult = nc >= 5 ? 2 : nc >= 3 ? 1.5 : 1;
      const earned = Math.round(BASE_COINS * mult * 1.5); // bonus for typing
      setCoins(c => c + earned);
      setTypeFeedback('correct'); setShowCoin(true);
      playTone('correct'); speak(q.correct.word);
      setTimeout(() => setShowCoin(false), 900);
      setTimeout(() => advance(coins + earned, mistakes, hearts, false), 1000);
    } else {
      setTypeFeedback('wrong'); setCombo(0);
      setAnimHeart(true); setTimeout(() => setAnimHeart(false), 500);
      const nh = hearts - 1; setHearts(nh);
      const nm = [...mistakes, q.correct]; setMistakes(nm);
      playTone('wrong');
      setTimeout(() => advance(coins, nm, nh, nh <= 0), 1600);
    }
  }, [busy, typedAnswer, q, combo, hearts, coins, mistakes, advance]);

  const optState = (opt) => {
    if (!selected) return 'default';
    if (opt.id === q.correct.id) return feedback === 'correct' ? 'correct' : 'show_correct';
    if (opt.id === selected && feedback === 'wrong') return 'wrong';
    return selected ? 'dimmed' : 'default';
  };

  // letter-box display for typing mode
  const letterBoxes = q.correct.word.split('').map((c, i) => {
    const hint = showHint && i === 0;
    const revealed = typeFeedback === 'correct';
    return { char: c, hint, revealed };
  });

  return (
    <div style={{ minHeight:'100vh', background:`linear-gradient(180deg,#060d1f 0%,${z.dark}88 100%)`,
      display:'flex', flexDirection:'column' }}>

      {/* ─ Top bar ─ */}
      <div style={{ padding:'14px 14px 0', display:'flex', alignItems:'center', gap:'10px' }}>
        <button
          onClick={() => setExitConfirm(true)}
          style={{ background:'rgba(255,255,255,.08)', border:'none', color:'#94a3b8',
            borderRadius:'10px', padding:'8px 11px', cursor:'pointer', fontSize:'.9rem', fontWeight:700, flexShrink:0 }}
        >
          ✕ ออก
        </button>
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px' }}>
            <span style={{ color:'#64748b', fontSize:'.75rem', fontWeight:700 }}>{idx+1} / {questions.length}</span>
            <Hearts count={hearts} animLose={animHeart} />
          </div>
          <div className="prog-bar">
            <div className="prog-fill" style={{ width:`${((idx) / questions.length) * 100}%` }} />
          </div>
        </div>
        <ComboBadge combo={combo} />
      </div>

      {/* ─ Zone badge ─ */}
      <div style={{ textAlign:'center', padding:'6px', marginTop:'2px' }}>
        <span style={{ color:z.color, fontSize:'.78rem', fontWeight:800 }}>
          {z.emoji} {zone.name} · Lv.{level}
        </span>
      </div>

      {/* ─ Question card ─ */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center',
        justifyContent:'center', padding:'12px 14px', gap:'14px' }}>

        <div style={{
          width:'100%',
          background:'rgba(255,255,255,.04)', border:`2px solid ${z.color}33`,
          borderRadius:'24px', padding:'26px 20px',
          textAlign:'center', position:'relative',
          minHeight:'220px', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', gap:'8px',
        }}>
          {showCoin && (
            <div style={{ position:'absolute', top:'50%', left:'50%',
              animation:'coinFloat .9s ease-out forwards',
              fontSize:'1.6rem', pointerEvents:'none', zIndex:10 }}>
              +💰
            </div>
          )}

          {level === 1 && (
            <>
              <div key={`photo-${idx}`} className="anim-bounce-in"
                style={{ display:'flex', justifyContent:'center' }}>
                <VocabImage item={q.correct} size={180} />
              </div>
              <div style={{ color:'#64748b', fontSize:'.82rem', marginTop:'10px' }}>คำนี้ภาษาอังกฤษว่าอย่างไร?</div>
            </>
          )}

          {level === 2 && (
            <>
              <div style={{ fontSize:'3.5rem', lineHeight:1 }}>🔊</div>
              <div style={{ color:'#e2e8f0', fontSize:'1.3rem', fontWeight:800 }}>{q.correct.thai}</div>
              <button
                onClick={() => speak(q.correct.word)}
                style={{ marginTop:'6px', background:`${z.color}22`, border:`1.5px solid ${z.color}55`,
                  borderRadius:'20px', padding:'6px 18px', color:z.color, fontSize:'.82rem',
                  fontWeight:800, cursor:'pointer', fontFamily:'inherit' }}
              >
                🔊 ฟังอีกครั้ง
              </button>
            </>
          )}

          {level === 3 && (
            <>
              <div key={`photo-${idx}`} className="anim-bounce-in"
                style={{ display:'flex', justifyContent:'center' }}>
                <VocabImage item={q.correct} size={140} />
              </div>
              {/* Letter boxes */}
              <div style={{ display:'flex', gap:'5px', justifyContent:'center', flexWrap:'wrap', marginTop:'10px' }}>
                {letterBoxes.map((lb, i) => (
                  lb.char === ' '
                    ? <div key={i} style={{ width:10 }} />
                    : <div key={i} style={{
                        width:28, height:32, borderRadius:6,
                        border:`2px solid ${typeFeedback==='correct'?'#22c55e':typeFeedback==='wrong'?'#ef4444':'#334155'}`,
                        background: typeFeedback==='correct'?'rgba(22,101,52,.7)':typeFeedback==='wrong'?'rgba(127,29,29,.5)':'rgba(14,26,52,.8)',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        color:'white', fontSize:'.85rem', fontWeight:900, fontFamily:'monospace',
                        transition:'all .2s',
                      }}>
                        {lb.revealed || lb.hint ? lb.char.toUpperCase() : ''}
                      </div>
                ))}
              </div>
              <div style={{ color:'#475569', fontSize:'.72rem', marginTop:'4px' }}>
                {q.correct.word.replace(/ /g,'').length} ตัวอักษร
                {q.correct.word.includes(' ') ? ` · ${q.correct.word.split(' ').length} คำ` : ''}
              </div>
            </>
          )}
        </div>

        {/* ─ Level 1 & 2: Runestones 2×2 ─ */}
        {level !== 3 && (
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', width:'100%' }}>
            {q.options.map(opt => (
              <RunestoneButton key={opt.id} option={opt} state={optState(opt)}
                onClick={() => answer(opt)} color={z.color} />
            ))}
          </div>
        )}

        {/* ─ Level 3: Typing input ─ */}
        {level === 3 && (
          <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:'10px' }}>
            <div style={{ position:'relative' }}>
              <input
                ref={inputRef}
                value={typedAnswer}
                onChange={e => !busy && setTypedAnswer(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && submitTyped()}
                placeholder="พิมพ์คำตอบที่นี่..."
                disabled={!!typeFeedback}
                autoCapitalize="none"
                autoCorrect="off"
                spellCheck="false"
                style={{
                  width:'100%', padding:'14px 16px',
                  background: typeFeedback==='correct'?'rgba(20,83,45,.9)':typeFeedback==='wrong'?'rgba(90,20,20,.9)':'rgba(14,26,52,.95)',
                  border:`2px solid ${typeFeedback==='correct'?'#22c55e':typeFeedback==='wrong'?'#ef4444':'#2d4070'}`,
                  borderRadius:16, color:'white', fontSize:'1.15rem', fontWeight:800,
                  fontFamily:'inherit', outline:'none', textAlign:'center', letterSpacing:'2px',
                  transition:'all .2s',
                }}
                className={typeFeedback === 'wrong' ? 'anim-shake' : ''}
              />
              {!showHint && !typeFeedback && (
                <button onClick={() => setShowHint(true)}
                  style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)',
                    background:'rgba(251,191,36,.15)', border:'1px solid rgba(251,191,36,.4)',
                    borderRadius:8, padding:'4px 8px', color:'#fbbf24', fontSize:'.72rem',
                    fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>
                  💡 ใบ้
                </button>
              )}
            </div>
            {typeFeedback === 'wrong' && (
              <div style={{ textAlign:'center', color:'#86efac', fontWeight:800, fontSize:'.9rem',
                padding:'8px', background:'rgba(20,83,45,.4)', borderRadius:10,
                border:'1px solid rgba(34,197,94,.3)' }}>
                ✓ คำที่ถูกต้อง: <span style={{ letterSpacing:'2px' }}>{q.correct.word.toUpperCase()}</span>
              </div>
            )}
            <button
              onClick={submitTyped}
              disabled={!!typeFeedback || !typedAnswer.trim()}
              style={{
                width:'100%', padding:'14px', borderRadius:14, border:'none',
                background: (!typedAnswer.trim() || typeFeedback) ? '#1e2d4a' : z.color,
                color:'white', fontSize:'1rem', fontWeight:900, cursor:'pointer', fontFamily:'inherit',
                opacity: (!typedAnswer.trim() || typeFeedback) ? .4 : 1,
                transition:'all .15s',
              }}
            >
              {typeFeedback === 'correct' ? '✓ ถูกต้อง!' : typeFeedback === 'wrong' ? '✗ ลองใหม่...' : '✓ ส่งคำตอบ'}
            </button>
          </div>
        )}

        {/* Coins */}
        <div style={{ color:'#fbbf24', fontWeight:700, fontSize:'.88rem' }}>
          💰 {coins} coins
        </div>
      </div>

      {/* Exit confirm dialog */}
      {exitConfirm && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.88)', zIndex:999,
          display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }}
          onClick={() => setExitConfirm(false)}>
          <div className="anim-bounce-in"
            style={{ background:'#0f1f3d', borderRadius:'20px', padding:'24px', width:'100%', maxWidth:'320px',
              border:'1.5px solid #2d4070', textAlign:'center' }}
            onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:'2rem', marginBottom:'10px' }}>🚪</div>
            <div style={{ color:'white', fontWeight:800, fontSize:'1rem', marginBottom:'6px' }}>ออกจากด่าน?</div>
            <div style={{ color:'#64748b', fontSize:'.82rem', marginBottom:'20px' }}>ความคืบหน้าในด่านนี้จะหายไป</div>
            <div style={{ display:'flex', gap:'10px' }}>
              <button onClick={() => setExitConfirm(false)}
                style={btnS('#2d4070')}>ยกเลิก</button>
              <button onClick={onExit}
                style={btnS('#ef4444')}>ออก</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════
   RESULTS SCREEN
════════════════════════════════════════════ */
function ResultsScreen({ zone, level, result, onPlayAgain, onNextLevel, onGoMap }) {
  const z = ZONES.find(z => z.id === zone.id);
  const { coins, mistakes, hearts, failed } = result;
  const uniqMistakes = [...new Map(mistakes.map(m => [m.id, m])).values()];

  const stars = failed ? 0 :
    mistakes.length === 0 ? 3 :
    mistakes.length <= 3  ? 2 : 1;

  const [animStar, setAnimStar] = useState(0);
  useEffect(() => {
    if (failed) return;
    const ts = [300, 600, 900].map((t, i) =>
      setTimeout(() => setAnimStar(i + 1), t));
    return () => ts.forEach(clearTimeout);
  }, [failed]);

  return (
    <div style={{ minHeight:'100vh', paddingBottom:'30px',
      background: failed
        ? 'linear-gradient(180deg,#2d0a0a,#060d1f)'
        : `linear-gradient(180deg,${z.dark}cc 0%,#060d1f 55%)`,
      display:'flex', flexDirection:'column', padding:'0 16px' }}>

      {/* Header */}
      <div style={{ textAlign:'center', paddingTop:'32px', marginBottom:'20px' }}>
        <div className="anim-bounce-in" style={{ fontSize:'3.5rem', marginBottom:'10px' }}>
          {failed ? '💔' : stars === 3 ? '🏆' : stars === 2 ? '🎉' : '✅'}
        </div>
        <h2 style={{ color:'white', fontSize:'1.5rem', fontWeight:900,
          textShadow:`0 2px 16px ${failed ? '#ef4444' : z.color}88` }}>
          {failed ? 'ความพยายามหมดแล้ว!' : 'ผ่านด่านแล้ว!'}
        </h2>
        {!failed && (
          <div style={{ color:'#64748b', fontSize:'.82rem', marginTop:'4px' }}>
            {zone.name} · Level {level}
          </div>
        )}
      </div>

      {/* Stars */}
      {!failed && (
        <div style={{ display:'flex', justifyContent:'center', gap:'14px', marginBottom:'20px' }}>
          {[1,2,3].map(i => (
            <span key={i} className={`star ${animStar >= i ? 'earned' : ''}`}
              style={{ animationDelay:`${(i-1)*.3}s` }}>⭐</span>
          ))}
        </div>
      )}

      {/* Stats row */}
      <div style={{ display:'flex', gap:'10px', marginBottom:'16px' }}>
        {[
          { icon:'💰', val: coins,           label:'Coins',    color:'#fbbf24' },
          { icon:'❌', val: mistakes.length,  label:'ตอบผิด',  color:'#f87171' },
          { icon:'❤️', val: hearts,           label:'เหลือ',   color:'#f87171' },
        ].map(s => (
          <div key={s.label} style={{ flex:1, textAlign:'center', background:'rgba(255,255,255,.04)',
            border:'1px solid rgba(255,255,255,.07)', borderRadius:'14px', padding:'12px 8px' }}>
            <div style={{ color:s.color, fontSize:'1.3rem', fontWeight:900 }}>{s.icon} {s.val}</div>
            <div style={{ color:'#475569', fontSize:'.72rem', marginTop:'2px' }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Mistake review */}
      {uniqMistakes.length > 0 && (
        <div style={{ marginBottom:'20px' }}>
          <div style={{ color:'#94a3b8', fontSize:'.82rem', fontWeight:700, marginBottom:'8px' }}>
            📝 คำที่ตอบผิด ({uniqMistakes.length} คำ) — ทบทวนก่อนไปต่อ
          </div>
          <div style={{ background:'rgba(255,255,255,.03)', borderRadius:'14px',
            border:'1px solid rgba(255,255,255,.07)', maxHeight:'220px', overflowY:'auto' }}>
            {uniqMistakes.map((m, i) => (
              <div key={m.id} style={{ display:'flex', alignItems:'center', gap:'12px',
                padding:'10px 14px',
                borderBottom: i < uniqMistakes.length-1 ? '1px solid rgba(255,255,255,.05)' : 'none' }}>
                <VocabImage item={m} size={48} />
                <div style={{ flex:1 }}>
                  <div style={{ color:'white', fontWeight:800 }}>{m.word}</div>
                  <div style={{ color:'#64748b', fontSize:'.78rem' }}>{m.thai}</div>
                </div>
                <button onClick={() => speak(m.word)}
                  style={{ background:'none', border:'none', fontSize:'1.2rem', cursor:'pointer' }}>
                  🔊
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Buttons */}
      <div style={{ display:'flex', flexDirection:'column', gap:'10px', marginTop:'auto' }}>
        {failed ? (
          <button onClick={onPlayAgain} style={btnS('#ef4444', true)}>🔄 ลองใหม่อีกครั้ง</button>
        ) : (
          <>
            {level < 3 && (
              <button onClick={onNextLevel} style={btnS(z.color, true)}>
                ▶ ด่านถัดไป — Lv.{level + 1} {LEVEL_INFO[level].name}
              </button>
            )}
            <button onClick={onPlayAgain} style={btnS('#334155', true)}>🔄 เล่นซ้ำ</button>
          </>
        )}
        <button onClick={onGoMap}
          style={{ ...btnS('transparent', true), border:'1.5px solid #1e2d4a', color:'#64748b' }}>
          🗺️ กลับแผนที่เกาะ
        </button>
      </div>
    </div>
  );
}

function btnS(bg, wide) {
  return {
    width: wide ? '100%' : '50%',
    padding:'13px',
    borderRadius:'14px',
    border:'none',
    background: bg,
    color:'white',
    fontSize:'.95rem',
    fontWeight:800,
    cursor:'pointer',
    fontFamily:'inherit',
    transition:'opacity .15s',
  };
}

        {/* Explorer card */}
        <div style={{ background:'rgba(255,255,255,.04)', border:'1px solid rgba(255,255,255,.07)',
          borderRadius:'16px', padding:'13px 14px', display:'flex', alignItems:'center', gap:'12px' }}>
          <div className="anim-float" style={{ fontSize:'2.2rem' }}>🧭</div>
          <div style={{ flex:1 }}>
            <div style={{ color:'white', fontWeight:800, fontSize:'.9rem' }}>นักสำรวจฝึกหัด</div>
            <div style={{ color:'#3d5070', fontSize:'.72rem', marginTop:'2px' }}>

              borderRadius:'10px', padding:'7px 11px', color:'#818cf8', fontSize:'.78rem',

        {ZONES.map((zone, i) => (

/* ════════════════════════════════════════════
   ADMIN SCREEN
════════════════════════════════════════════ */
function AdminScreen({ vocabulary, onUpdate, onBack }) {
  const [tab, setTab]             = useState('animal');
  const [showForm, setShowForm]   = useState(false);
  const [editItem, setEditItem]   = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState('');
  const [form, setForm]           = useState({ word:'', thai:'', emoji:'⭐', zone:'animal', img:'' });
  const [filter, setFilter]       = useState('');

  const zoneVocab = vocabulary.filter(v => v.zone === tab &&
    (!filter || v.word.toLowerCase().includes(filter.toLowerCase()) || v.thai.includes(filter)));
  const activeZ = ZONES.find(z => z.id === tab);

  const openAdd = () => {
    setEditItem(null);
    setForm({ word:'', thai:'', emoji:'⭐', zone: tab, img:'' });
    setShowForm(true);
  };

  const openEdit = item => {
    setEditItem(item);
    setForm({ word: item.word, thai: item.thai, emoji: item.emoji, zone: item.zone, img: item.img||'' });
    setShowForm(true);
  };

  const save = () => {
    if (!form.word.trim() || !form.thai.trim()) return;
    if (editItem) {
      onUpdate(vocabulary.map(v => v.id === editItem.id ? { ...v, ...form } : v));
    } else {
      const newId = Math.max(0, ...vocabulary.map(v => v.id)) + 1;
      onUpdate([...vocabulary, { id: newId, ...form }]);
    }
    setShowForm(false); setEditItem(null);
  };

  const del = id => {
    if (!window.confirm('ลบคำศัพท์นี้?')) return;
    onUpdate(vocabulary.filter(v => v.id !== id));
  };

  const reset = () => {
    if (!window.confirm('รีเซ็ตคำศัพท์ทั้งหมดกลับค่าเริ่มต้น?')) return;
    onUpdate(DEFAULT_VOCAB);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(vocabulary, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mystic-vocab.json';
    a.click();
  };

  const doImport = () => {
    try {
      const data = JSON.parse(importText);
      if (!Array.isArray(data)) throw new Error();
      onUpdate(data);
      setShowImport(false); setImportText('');
      alert(`นำเข้าสำเร็จ! ${data.length} คำศัพท์`);
    } catch { alert('ข้อมูล JSON ไม่ถูกต้อง กรุณาตรวจสอบ format'); }
  };

  const iS = { // input style
    width:'100%', background:'#060d1f', border:'1.5px solid #1e2d4a',
    borderRadius:'10px', padding:'10px 13px', color:'white',
    fontSize:'.95rem', fontFamily:'inherit', display:'block',
  };

  return (
    <div style={{ minHeight:'100vh', background:'#060d1f', paddingBottom:'40px' }}>

      {/* ─ Admin Header ─ */}
      <div style={{ background:'linear-gradient(135deg,#1a1740,#2d2a6e)',
        padding:'18px 16px', borderBottom:'1px solid rgba(99,102,241,.25)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'14px' }}>
          <button onClick={onBack}
            style={{ background:'rgba(255,255,255,.08)', border:'none', color:'white',
              borderRadius:'10px', padding:'8px 14px', cursor:'pointer', fontFamily:'inherit',
              fontWeight:700, fontSize:'.85rem' }}>
            ← กลับ
          </button>
          <div>
            <div style={{ color:'white', fontWeight:900, fontSize:'1.05rem' }}>⚙️ Admin Panel</div>
            <div style={{ color:'#7c86e8', fontSize:'.72rem' }}>จัดการคลังคำศัพท์ · {vocabulary.length} คำ</div>
          </div>
        </div>

        {/* Action row */}
        <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
          {[
            { label:'+ เพิ่มคำ', color:'#22c55e', action: openAdd },
            { label:'📤 Export', color:'#0ea5e9', action: exportJSON },
            { label:'📥 Import', color:'#f59e0b', action: () => setShowImport(true) },
            { label:'🔄 Reset',  color:'#ef4444', action: reset },
          ].map(b => (
            <button key={b.label} onClick={b.action} style={{
              background:`${b.color}22`, border:`1.5px solid ${b.color}55`,
              borderRadius:'10px', padding:'6px 13px', color: b.color,
              fontWeight:800, fontSize:'.78rem', cursor:'pointer', fontFamily:'inherit' }}>
              {b.label}
            </button>
          ))}
        </div>
      </div>

      {/* ─ Zone tabs ─ */}
      <div style={{ display:'flex', overflowX:'auto', gap:'8px',
        padding:'12px 14px', background:'#060d1f',
        borderBottom:'1px solid #0e1c36', scrollbarWidth:'none' }}>
        {ZONES.map(z => (
          <button key={z.id} onClick={() => { setTab(z.id); setFilter(''); }} style={{
            flexShrink:0, padding:'6px 14px', borderRadius:'20px',
            border:`1.5px solid ${tab === z.id ? z.color : '#1e2d4a'}`,
            background: tab === z.id ? `${z.color}22` : 'transparent',
            color: tab === z.id ? z.color : '#3d5070',
            fontWeight:800, fontSize:'.78rem', cursor:'pointer', fontFamily:'inherit',
            whiteSpace:'nowrap' }}>
            {z.emoji} {z.name}
          </button>
        ))}
      </div>

      {/* ─ Search + count ─ */}
      <div style={{ padding:'12px 14px 6px', display:'flex', gap:'10px', alignItems:'center' }}>
        <input
          value={filter}
          onChange={e => setFilter(e.target.value)}
          placeholder="🔍 ค้นหาคำศัพท์..."
          style={{ ...iS, flex:1, padding:'8px 12px', fontSize:'.85rem' }}
        />
        <span style={{ color:'#3d5070', fontSize:'.78rem', whiteSpace:'nowrap', flexShrink:0 }}>
          {zoneVocab.length} คำ
        </span>
      </div>

      {zoneVocab.length < 4 && !filter && (
        <div style={{ margin:'0 14px 8px', padding:'8px 12px', background:'rgba(239,68,68,.1)',
          border:'1px solid rgba(239,68,68,.3)', borderRadius:'10px',
          color:'#f87171', fontSize:'.78rem' }}>
          ⚠️ ต้องมีอย่างน้อย 4 คำเพื่อให้เล่นเกมได้
        </div>
      )}

      {/* ─ Word list ─ */}
      <div style={{ padding:'0 14px' }}>
        {zoneVocab.length === 0 ? (
          <div style={{ textAlign:'center', color:'#2d4070', padding:'40px 20px', fontSize:'.88rem' }}>
            {filter ? 'ไม่พบคำศัพท์ที่ค้นหา' : 'ยังไม่มีคำศัพท์ในโซนนี้'}<br/>
            {!filter && <span style={{ fontSize:'.78rem' }}>กด "+ เพิ่มคำ" เพื่อเริ่มต้น</span>}
          </div>
        ) : zoneVocab.map(item => (
          <div key={item.id} style={{ display:'flex', alignItems:'center', gap:'10px',
            padding:'11px 13px', background:'rgba(255,255,255,.03)',
            border:'1px solid rgba(255,255,255,.055)', borderRadius:'12px', marginBottom:'7px' }}>
            <VocabImage item={item} size={48} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ color:'white', fontWeight:800, fontSize:'.92rem' }}>{item.word}</div>
              <div style={{ color:'#3d5070', fontSize:'.75rem' }}>{item.thai}</div>
            </div>
            <button onClick={() => speak(item.word)}
              style={{ background:'none', border:'none', fontSize:'1.1rem', cursor:'pointer', padding:'4px' }}>
              🔊
            </button>
            <button onClick={() => openEdit(item)}
              style={{ background:'rgba(251,191,36,.1)', border:'1px solid rgba(251,191,36,.25)',
                borderRadius:'8px', padding:'4px 9px', color:'#fbbf24',
                cursor:'pointer', fontSize:'.75rem', fontWeight:700, fontFamily:'inherit' }}>
              แก้ไข
            </button>
            <button onClick={() => del(item.id)}
              style={{ background:'rgba(239,68,68,.1)', border:'1px solid rgba(239,68,68,.25)',
                borderRadius:'8px', padding:'4px 9px', color:'#f87171',
                cursor:'pointer', fontSize:'.75rem', fontWeight:700, fontFamily:'inherit' }}>
              ลบ
            </button>
          </div>
        ))}
      </div>

      {/* ─ Help section ─ */}
      <div style={{ margin:'16px 14px 0', padding:'14px', background:'rgba(99,102,241,.08)',
        border:'1px solid rgba(99,102,241,.2)', borderRadius:'14px' }}>
        <div style={{ color:'#818cf8', fontWeight:800, fontSize:'.82rem', marginBottom:'8px' }}>
          💡 คำแนะนำ
        </div>
        <div style={{ color:'#4d5d8a', fontSize:'.75rem', lineHeight:1.6 }}>
          • แต่ละโซนต้องมีอย่างน้อย 4 คำจึงจะเล่นได้<br/>
          • ใส่ Emoji ได้โดยตรง เช่น 🐱 🍎 🏠<br/>
          • Export เพื่อสำรองข้อมูล, Import เพื่อนำเข้าคลัง<br/>
          • กด 🔊 เพื่อฟังการออกเสียงภาษาอังกฤษ
        </div>
      </div>

      {/* ─ Add/Edit Modal ─ */}
      {showForm && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.9)', zIndex:999,
          display:'flex', alignItems:'flex-end', justifyContent:'center' }}
          onClick={() => { setShowForm(false); setEditItem(null); }}>
          <div className="anim-slide-up"
            style={{ width:'100%', maxWidth:'480px', background:'#0f1f3d',
              borderRadius:'24px 24px 0 0', padding:'24px 20px 36px',
              borderTop:'3px solid #6366f1' }}
            onClick={e => e.stopPropagation()}>

            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px' }}>
              <h3 style={{ color:'white', fontWeight:900, fontSize:'1rem' }}>
                {editItem ? '✏️ แก้ไขคำศัพท์' : '➕ เพิ่มคำศัพท์ใหม่'}
              </h3>
              <button onClick={() => { setShowForm(false); setEditItem(null); }}
                style={{ background:'rgba(255,255,255,.08)', border:'none', color:'#94a3b8',

            <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
              {[
                { key:'word',  label:'คำศัพท์ภาษาอังกฤษ *',  placeholder:'Cat' },

              <div>
                <label style={{ color:'#64748b', fontSize:'.78rem', fontWeight:700,
                  display:'block', marginBottom:'6px' }}>โซน</label>

                  {ZONES.map(z => <option key={z.id} value={z.id}>{z.emoji} {z.name} — {z.thai}</option>)}
                </select>
              </div>

              {/* Preview */}
              <div style={{ background:'rgba(255,255,255,.04)', border:'1px solid rgba(255,255,255,.07)',

            </div>

        </div>
      )}

      {/* ─ Import Modal ─ */}
      {showImport && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.9)', zIndex:999,
          display:'flex', alignItems:'flex-end', justifyContent:'center' }}

          <div className="anim-slide-up"
            style={{ width:'100%', maxWidth:'480px', background:'#0f1f3d',
              borderRadius:'24px 24px 0 0', padding:'24px 20px 36px',
              borderTop:'3px solid #f59e0b' }}

            <div style={{ color:'#64748b', fontSize:'.78rem', marginBottom:'10px' }}>

            </div>

              value={importText}
              onChange={e => setImportText(e.target.value)}

              placeholder={`[\n  {"id":1,"zone":"animal","word":"Cat","thai":"แมว","emoji":"🐱"}\n]`}
              style={{ ...iS, resize:'none', fontFamily:'monospace', fontSize:'.78rem', lineHeight:1.5 }}
            />
            <div style={{ display:'flex', gap:'10px', marginTop:'14px' }}>
              <button onClick={() => setShowImport(false)} style={btnS('#1e2d4a')}>ยกเลิก</button>
              <button onClick={doImport} style={btnS('#f59e0b')}>นำเข้า</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ShopModal({ coins, inventory, onBuy, onClose }) {
  const [cat, setCat] = useState('all');
  const items = cat === 'all' ? SHOP_ITEMS : SHOP_ITEMS.filter(i => i.cat === cat);

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.92)', zIndex:999,
      display:'flex', flexDirection:'column', justifyContent:'flex-end', alignItems:'center' }}
      onClick={onClose}>
      <div className="anim-slide-up"
        style={{ width:'100%', maxWidth:480, background:'#0a1628',
          borderRadius:'24px 24px 0 0', maxHeight:'85vh', display:'flex', flexDirection:'column',
          borderTop:'3px solid #f59e0b' }}
        onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ padding:'18px 18px 10px', display:'flex', alignItems:'center', gap:'10px',
          borderBottom:'1px solid #1e2d4a', flexShrink:0 }}>
          <div style={{ flex:1 }}>
            <div style={{ color:'white', fontWeight:900, fontSize:'1.05rem' }}>🛍️ ร้านค้าบนเกาะ</div>
            <div style={{ color:'#64748b', fontSize:'.75rem' }}>ใช้เหรียญซื้อของตกแต่งเกาะ</div>
          </div>
          <div style={{ background:'rgba(251,191,36,.15)', border:'1.5px solid rgba(251,191,36,.4)',
            borderRadius:20, padding:'5px 13px', color:'#fbbf24', fontWeight:800, fontSize:'.9rem' }}>
            💰 {coins}
          </div>
          <button onClick={onClose} style={{ background:'rgba(255,255,255,.08)', border:'none',
            color:'#94a3b8', borderRadius:10, padding:'6px 10px', cursor:'pointer', fontSize:'1rem' }}>✕</button>
        </div>

        {/* Category tabs */}
        <div style={{ display:'flex', overflowX:'auto', gap:'6px', padding:'10px 14px',
          flexShrink:0, scrollbarWidth:'none' }}>
          {SHOP_CATS.map(c => (
            <button key={c.id} onClick={() => setCat(c.id)} style={{
              flexShrink:0, padding:'5px 12px', borderRadius:20,
              border:`1.5px solid ${cat===c.id?'#f59e0b':'#1e2d4a'}`,
              background: cat===c.id?'rgba(245,158,11,.2)':'transparent',
              color: cat===c.id?'#fbbf24':'#475569',
              fontWeight:800, fontSize:'.75rem', cursor:'pointer', fontFamily:'inherit',
            }}>{c.emoji} {c.label}</button>
          ))}
        </div>

        {/* Item grid */}
        <div style={{ overflowY:'auto', padding:'0 12px 24px',
          display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px' }}>
          {items.map(item => {
            const owned = inventory[item.id] || 0;
            const canBuy = coins >= item.price;
            return (
              <div key={item.id} style={{ background:'rgba(255,255,255,.04)',
                border:`1.5px solid ${canBuy?'#2d4070':'#1a2438'}`, borderRadius:16, padding:'14px 10px',
                display:'flex', flexDirection:'column', alignItems:'center', gap:'6px', textAlign:'center' }}>
                <div style={{ fontSize:'2.5rem', lineHeight:1 }}>{item.emoji}</div>
                <div style={{ color:'white', fontWeight:800, fontSize:'.85rem', lineHeight:1.2 }}>{item.name}</div>
                <div style={{ color:'#475569', fontSize:'.7rem' }}>{item.desc}</div>
                {owned > 0 && (
                  <div style={{ color:'#22c55e', fontSize:'.72rem', fontWeight:700 }}>มีแล้ว {owned} ชิ้น</div>
                )}
                <button onClick={() => canBuy && onBuy(item)}
                  disabled={!canBuy}
                  style={{ width:'100%', marginTop:'4px', padding:'7px', borderRadius:10, border:'none',
                    background: canBuy?'#f59e0b':'#1e2d4a',
                    color: canBuy?'#000':'#334155',
                    fontWeight:900, fontSize:'.82rem', cursor: canBuy?'pointer':'default', fontFamily:'inherit',
                    opacity: canBuy?1:.5 }}>
                  💰 {item.price}
                </button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   ISLAND SCREEN
════════════════════════════════════════════ */
function IslandScreen({ playerData, setPlayerData, inventory, setInventory, onBack }) {
  const [grid, setGrid]           = useLS('mwi_island_grid', {});
  const [islandName, setIslandName] = useLS('mwi_island_name', 'เกาะของฉัน');
  const [selected, setSelected]   = useState(null); // shop item to place
  const [shopOpen, setShopOpen]   = useState(false);
  const [editName, setEditName]   = useState(false);
  const [nameInput, setNameInput] = useState(islandName);
  const [removeMode, setRemoveMode] = useState(false);
  const [toast, setToast]         = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 1800); };

  const coins = playerData.coins || 0;

  const buyItem = (item) => {
    if (coins < item.price) return;
    setPlayerData(p => ({ ...p, coins: (p.coins||0) - item.price }));
    setInventory(inv => ({ ...inv, [item.id]: (inv[item.id]||0) + 1 }));
    showToast(`ซื้อ ${item.name} แล้ว! 🎉`);
  };

  const selectItem = (item) => {
    if ((inventory[item.id]||0) <= 0) return;
    setSelected(item);
    setRemoveMode(false);
    showToast(`เลือก ${item.emoji} แตะช่องบนเกาะเพื่อวาง`);
  };

  const handleCellTap = (cellIdx) => {
    const terrain = TERRAIN_MAP[cellIdx];
    const key = String(cellIdx);

    if (removeMode) {
      if (grid[key]) {
        const it = SHOP_ITEMS.find(s => s.id === grid[key].id);
        if (it) setInventory(inv => ({ ...inv, [it.id]: (inv[it.id]||0)+1 }));
        setGrid(g => { const n={...g}; delete n[key]; return n; });
        showToast('นำออกแล้ว คืนไปคลัง ✓');
      }
      return;
    }

    if (!selected) return;
    if (terrain === 'O') { showToast('ไม่สามารถวางบนทะเลได้ 🌊'); return; }

    // return existing item to inventory
    if (grid[key]) {
      const old = SHOP_ITEMS.find(s => s.id === grid[key].id);
      if (old) setInventory(inv => ({ ...inv, [old.id]: (inv[old.id]||0)+1 }));
    }

    setGrid(g => ({ ...g, [key]: { id: selected.id, emoji: selected.emoji, name: selected.name } }));
    setInventory(inv => {
      const next = { ...inv, [selected.id]: (inv[selected.id]||0) - 1 };
      if (next[selected.id] <= 0) setSelected(null);
      return next;
    });
  };

  const ownedItems = SHOP_ITEMS.filter(i => (inventory[i.id]||0) > 0);
  const totalItems = Object.keys(grid).length;

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(180deg,#060d1f,#0c2040)',
      display:'flex', flexDirection:'column', paddingBottom:24 }}>

      {/* Header */}
      <div style={{ padding:'16px 14px 10px', display:'flex', alignItems:'center', gap:'10px',
        background:'rgba(6,13,31,.95)', borderBottom:'1px solid #0e1c36' }}>
        <button onClick={onBack} style={{ background:'rgba(255,255,255,.08)', border:'none', color:'#94a3b8',
          borderRadius:10, padding:'7px 12px', cursor:'pointer', fontFamily:'inherit',
          fontWeight:700, fontSize:'.82rem' }}>← กลับ</button>
        <div style={{ flex:1 }}>
          {editName ? (
            <div style={{ display:'flex', gap:'6px' }}>
              <input value={nameInput} onChange={e=>setNameInput(e.target.value)}
                style={{ flex:1, background:'#0f1f3d', border:'1.5px solid #6366f1',
                  borderRadius:8, padding:'4px 8px', color:'white', fontSize:'.9rem', fontFamily:'inherit', outline:'none' }} />
              <button onClick={() => { setIslandName(nameInput); setEditName(false); }}
                style={{ background:'#6366f1', border:'none', borderRadius:8, padding:'4px 10px',
                  color:'white', cursor:'pointer', fontWeight:700, fontFamily:'inherit', fontSize:'.8rem' }}>✓</button>
            </div>
          ) : (
            <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
              <span style={{ color:'white', fontWeight:900, fontSize:'1rem' }}>{islandName}</span>
              <button onClick={() => { setEditName(true); setNameInput(islandName); }}
                style={{ background:'none', border:'none', color:'#475569', cursor:'pointer', fontSize:'.85rem' }}>✏️</button>
            </div>
          )}
          <div style={{ color:'#3d5070', fontSize:'.7rem' }}>{totalItems} ชิ้นบนเกาะ</div>
        </div>
        <div style={{ background:'rgba(251,191,36,.12)', border:'1.5px solid rgba(251,191,36,.3)',
          borderRadius:18, padding:'4px 11px', color:'#fbbf24', fontWeight:800, fontSize:'.85rem' }}>
          💰 {coins}
        </div>
      </div>

      {/* Island Grid */}
      <div style={{ padding:'14px 10px 6px', flex:1 }}>
        <div style={{
          display:'grid',
          gridTemplateColumns:`repeat(${ISLAND_COLS}, 1fr)`,
          gap:4,
          background:'#0c2244',
          borderRadius:16,
          padding:6,
          border:'2px solid #1a3560',
          boxShadow:'0 0 30px rgba(30,111,166,.4)',
        }}>
          {TERRAIN_MAP.map((terrain, i) => {
            const key = String(i);
            const placed = grid[key];
            const isTarget = selected && terrain !== 'O';
            const isRemovable = removeMode && placed;
            return (
              <div key={i}
                onClick={() => terrain !== 'O' || placed ? handleCellTap(i) : undefined}
                style={{
                  aspectRatio:'1', borderRadius:8,
                  background: TERRAIN_COLOR[terrain],
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:'1.3rem', lineHeight:1,
                  border: isTarget ? '2px dashed rgba(255,255,255,.5)'
                    : isRemovable ? '2px solid #ef4444'
                    : '1px solid rgba(0,0,0,.15)',
                  cursor: (isTarget || isRemovable || placed) ? 'pointer' : 'default',
                  position:'relative', overflow:'hidden',
                  boxShadow: placed ? 'inset 0 -2px 4px rgba(0,0,0,.3)' : 'none',
                  transition:'border .15s',
                }}>
                {placed && <span style={{ filter:'drop-shadow(0 2px 4px rgba(0,0,0,.5))' }}>{placed.emoji}</span>}
                {isTarget && !placed && <span style={{ opacity:.25, fontSize:'1rem' }}>+</span>}
                {isRemovable && (
                  <div style={{ position:'absolute', inset:0, background:'rgba(239,68,68,.2)',
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:'.7rem' }}>🗑️</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Status bar under grid */}
        <div style={{ display:'flex', gap:'8px', marginTop:'8px', justifyContent:'center', flexWrap:'wrap' }}>
          {selected && (
            <div style={{ background:'rgba(34,197,94,.15)', border:'1px solid rgba(34,197,94,.4)',
              borderRadius:20, padding:'4px 12px', color:'#4ade80', fontSize:'.78rem', fontWeight:700 }}>
              🖐️ กำลังวาง: {selected.emoji} {selected.name}
              <button onClick={() => setSelected(null)}
                style={{ marginLeft:6, background:'none', border:'none', color:'#64748b', cursor:'pointer', fontSize:'.75rem' }}>✕</button>
            </div>
          )}
          {removeMode && (
            <div style={{ background:'rgba(239,68,68,.15)', border:'1px solid rgba(239,68,68,.4)',
              borderRadius:20, padding:'4px 12px', color:'#f87171', fontSize:'.78rem', fontWeight:700 }}>
              🗑️ โหมดลบ — แตะสิ่งของเพื่อเอาออก
              <button onClick={() => setRemoveMode(false)}
                style={{ marginLeft:6, background:'none', border:'none', color:'#64748b', cursor:'pointer', fontSize:'.75rem' }}>✕</button>
            </div>
          )}
        </div>
      </div>

      {/* Inventory bar */}
      <div style={{ padding:'0 10px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
          marginBottom:6, padding:'0 4px' }}>
          <div style={{ color:'#3d5070', fontSize:'.72rem', fontWeight:700 }}>
            🎒 คลังของฉัน ({ownedItems.length} ประเภท)
          </div>
          <div style={{ display:'flex', gap:'6px' }}>
            <button onClick={() => { setRemoveMode(r=>!r); setSelected(null); }}
              style={{ background: removeMode?'rgba(239,68,68,.2)':'rgba(255,255,255,.06)',
                border:`1px solid ${removeMode?'#ef444466':'#1e2d4a'}`,
                borderRadius:8, padding:'4px 10px', color: removeMode?'#f87171':'#475569',
                cursor:'pointer', fontWeight:700, fontSize:'.72rem', fontFamily:'inherit' }}>
              🗑️ ลบ
            </button>
            <button onClick={() => setShopOpen(true)}
              style={{ background:'rgba(245,158,11,.18)', border:'1.5px solid rgba(245,158,11,.45)',
                borderRadius:8, padding:'4px 12px', color:'#fbbf24',
                cursor:'pointer', fontWeight:800, fontSize:'.78rem', fontFamily:'inherit' }}>
              🛍️ ร้านค้า
            </button>
          </div>
        </div>

        {ownedItems.length === 0 ? (
          <div style={{ textAlign:'center', color:'#1e2d4a', padding:'14px', fontSize:'.8rem' }}>
            ยังไม่มีของ — กด 🛍️ ร้านค้า เพื่อซื้อของตกแต่งด้วยเหรียญ
          </div>
        ) : (
          <div style={{ display:'flex', gap:'8px', overflowX:'auto', paddingBottom:6, scrollbarWidth:'none' }}>
            {ownedItems.map(item => (
              <div key={item.id}
                onClick={() => selectItem(item)}
                style={{
                  flexShrink:0, width:64, textAlign:'center',
                  background: selected?.id===item.id ? 'rgba(34,197,94,.2)' : 'rgba(255,255,255,.05)',
                  border:`2px solid ${selected?.id===item.id?'#22c55e':'#1e2d4a'}`,
                  borderRadius:12, padding:'8px 4px', cursor:'pointer',
                  transition:'all .15s',
                }}>
                <div style={{ fontSize:'1.8rem', lineHeight:1 }}>{item.emoji}</div>
                <div style={{ color:'#64748b', fontSize:'.6rem', marginTop:2 }}>{item.name}</div>
                <div style={{ color:'#22c55e', fontSize:'.68rem', fontWeight:800 }}>x{inventory[item.id]||0}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Toast */}
      {toast && (
        <div className="anim-fade-up" style={{ position:'fixed', bottom:90, left:'50%', transform:'translateX(-50%)',
          background:'rgba(15,31,61,.96)', border:'1px solid #2d4070', borderRadius:20,
          padding:'8px 18px', color:'white', fontWeight:700, fontSize:'.85rem',
          boxShadow:'0 4px 20px rgba(0,0,0,.5)', zIndex:500, whiteSpace:'nowrap' }}>
          {toast}
        </div>
      )}

      {shopOpen && (
        <ShopModal coins={coins} inventory={inventory} onBuy={buyItem} onClose={() => setShopOpen(false)} />
      )}
    </div>
  );
}

/* ════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════ */
function App() {
  const [vocabulary, setVocabulary] = useLS('mwi_vocab',    DEFAULT_VOCAB);
  const [playerData, setPlayerData] = useLS('mwi_player',   { coins: 0 });
  const [progress,   setProgress]   = useLS('mwi_progress', {});
  const [inventory,  setInventory]  = useLS('mwi_inventory', {});

  const [screen,      setScreen]      = useState('splash');
  const [activeZone,  setActiveZone]  = useState(null);
  const [activeLevel, setActiveLevel] = useState(1);
  const [lastResult,  setLastResult]  = useState(null);

  const handleSelectZone = (zone, level) => {
    const count = vocabulary.filter(v => v.zone === zone.id).length;
    if (count < 4) {
      alert(`โซน "${zone.name}" มีคำศัพท์ ${count} คำ\nต้องการอย่างน้อย 4 คำเพื่อเล่นได้\nกรุณาเพิ่มคำศัพท์ใน Admin Panel`);
      return;
    }
    setActiveZone(zone);
    setActiveLevel(level);
    setScreen('gameplay');
  };

  const handleComplete = result => {
    setLastResult(result);
    if (!result.failed) {
      const stars = result.mistakes.length === 0 ? 3 : result.mistakes.length <= 3 ? 2 : 1;
      setProgress(prev => ({
        ...prev,
        [activeZone.id]: {
          ...prev[activeZone.id],
          [`level${activeLevel}`]: {
            stars: Math.max((prev[activeZone.id]?.[`level${activeLevel}`]?.stars || 0), stars),
          },
        },
      }));
      setPlayerData(prev => ({ ...prev, coins: (prev.coins || 0) + result.coins }));
    }
    setScreen('results');
  };

  return (
    <div style={{ width:'100%', maxWidth:'480px', margin:'0 auto', minHeight:'100vh' }}>
      {screen === 'splash' && <SplashScreen onDone={() => setScreen('home')} />}

      {screen === 'home' && (
        <HomeScreen
          vocabulary={vocabulary}
          playerData={playerData}
          progress={progress}
          onSelectZone={handleSelectZone}
          onAdmin={() => setScreen('admin')}
          onIsland={() => setScreen('island')}
        />
      )}

      {screen === 'gameplay' && activeZone && (
        <GameplayScreen
          key={`${activeZone.id}-${activeLevel}-${Date.now()}`}
          zone={activeZone}
          level={activeLevel}
          vocabulary={vocabulary}
          onComplete={handleComplete}
          onExit={() => setScreen('home')}
        />
      )}

      {screen === 'results' && lastResult && activeZone && (
        <ResultsScreen
          zone={activeZone}
          level={activeLevel}
          result={lastResult}
          onPlayAgain={() => { setLastResult(null); setScreen('gameplay'); }}
          onNextLevel={() => { setActiveLevel(l => l + 1); setLastResult(null); setScreen('gameplay'); }}
          onGoMap={() => { setLastResult(null); setScreen('home'); }}
        />
      )}

      {screen === 'admin' && (
        <AdminScreen
          vocabulary={vocabulary}
          onUpdate={setVocabulary}
          onBack={() => setScreen('home')}
        />
      )}

      {screen === 'island' && (
        <IslandScreen
          playerData={playerData}
          setPlayerData={setPlayerData}
          inventory={inventory}
          setInventory={setInventory}
          onBack={() => setScreen('home')}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
